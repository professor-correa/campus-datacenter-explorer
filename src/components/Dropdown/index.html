<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  <meta charset="UTF-8" />
  <title>Dropdown Outros Serviços</title>
</head>
<body>

  <div class="dropdown-container" id="outros-servicos-dropdown" aria-expanded="false">
    <div class="dropdown-header">
      <h3 class="dropdown-title">Outros Serviços</h3>
      <button class="dropdown-toggle" aria-label="Alternar outros serviços" aria-expanded="false" id="outros-servicos-button">
        <img src="../../assets/icons/dropdown.svg" alt="">
      </button>
    </div>
    <p class="dropdown-content" id="outros-servicos-content">
      Utilizamos o ARDUINO UNO para a aplicação de aferição de temperatura e umidade dos RACK's (Sensor de temperatura), pensando no controle de um datacenter estes são controles essenciais, pois inferem diretamente no funcionamento dos dispositivos.
    </p>
  </div>

  <script>
    // Toggle do dropdown
    (function () {
      const container = document.getElementById('outros-servicos-dropdown');
      const button = document.getElementById('outros-servicos-button');

      function toggle() {
        const isOpen = container.classList.toggle('open');
        container.setAttribute('aria-expanded', String(isOpen));
        button.setAttribute('aria-expanded', String(isOpen));
      }

      // Clicar no botão alterna
      button.addEventListener('click', toggle);

      // Também permitir clicar no título (acessibilidade)
      container.querySelector('.dropdown-title').addEventListener('click', toggle);
    })();
  </script>

</body>
</html>
