<div class="rack-component">
    <h6>Clique nas imagens e veja mais sobre</h6>
    <div class="rack-container">
        <span data-popup="distribution" class="rack-button distribution"></span>
        <span data-popup="switch" class="rack-button switch"></span>
        <span data-popup="monitor" class="rack-button monitor"></span>
        <span data-popup="server" class="rack-button server"></span>
        <span data-popup="patch" class="rack-button patch"></span>

        <div class="popup" data-popup-id="distribution">
            <span class="close-popup">&times;</span>
            <h3>Distribuição</h3>
            <p>Informações do módulo de distribuição.</p>
        </div>

        <div class="popup" data-popup-id="switch">
            <span class="close-popup">&times;</span>
            <h3>Switch</h3>
            <p>Informações do switch.</p>
        </div>

        <div class="popup" data-popup-id="monitor">
            <span class="close-popup">&times;</span>
            <h3>Monitor</h3>
            <p>Informações da tela de monitoramento.</p>
        </div>

        <div class="popup" data-popup-id="server">
            <span class="close-popup">&times;</span>
            <h3>Servidor</h3>
            <p>Informações do Servidor Windows Server.</p>
        </div>

        <div class="popup" data-popup-id="patch">
            <span class="close-popup">&times;</span>
            <h3>Patch Panel</h3>
            <p>Informações do Patch Panel.</p>
        </div>
    </div>
</div>

<script src="popupScript.js"></script>
